services:
  - type: web
    name: sports-tracker
    runtime: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 app:app
    envVars:
      - key: NTFY_TOPIC
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: 10000
